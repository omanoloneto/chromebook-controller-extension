<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Aula — Pareamento</title>
    <link rel="stylesheet" href="pairing.css" />
  </head>
  <body>
    <main class="cartao">
      <h1>Conectar ao celular</h1>
      <p class="status" id="status">Preparando câmera…</p>

      <!-- Ler o QR do celular -->
      <section id="etapa-camera" hidden>
        <p class="passo">Aponte a câmera para o QR que está na tela do celular:</p>
        <video id="camera" autoplay playsinline muted></video>
      </section>

      <!-- Confirmar conexão (gesto do usuário p/ pedir permissão do IP) -->
      <section id="etapa-confirmar" hidden>
        <p class="passo">QR lido. Conectar a <span id="alvo"></span>?</p>
        <button id="btn-conectar">Conectar</button>
      </section>

      <!-- Conectado -->
      <section id="etapa-ok" hidden>
        <p class="ok">✅ Conectado ao celular!</p>
        <p>Pode fechar esta aba — a conexão continua ativa. O professor já pode
          enviar sites pelo app.</p>
      </section>

      <p class="erro" id="erro" hidden></p>

      <button id="btn-fechar" hidden>Fechar</button>
    </main>

    <script type="module" src="pairing.js"></script>
  </body>
</html>
