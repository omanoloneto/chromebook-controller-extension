<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Aula</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Controle de Aula</h1>
      <p class="status" id="status">Procurando o professor…</p>
    </header>

    <main>
      <section id="conectado" hidden>
        <p class="ok">✅ Conectado ao professor.</p>
      </section>

      <section id="procurando">
        <p class="passo">Procurando o celular do professor na rede…</p>
        <p class="dica" id="detalhe"></p>
        <p class="dica">Funciona sozinho na mesma Wi-Fi. Se demorar, informe o IP
          do celular (aparece no app):</p>
        <input id="ip" type="text" inputmode="decimal" placeholder="ex.: 192.168.1.50" />
        <button id="btn-ip">Usar este IP</button>
      </section>

      <button id="btn-reset" class="secundario">Desvincular professor</button>
    </main>

    <footer>
      <small>O 1º professor que encontrar este PC fica vinculado a ele.</small>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
