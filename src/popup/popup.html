<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Aula</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Controle de Aula</h1>
      <p class="status" id="status">Não pareado</p>
    </header>

    <main>
      <p id="dica" class="passo">Conecte ao celular do professor para receber sites nesta tela.</p>

      <section id="conectado" hidden>
        <p class="ok">✅ Conectado ao celular.</p>
      </section>

      <button id="btn-parear">Parear</button>
    </main>

    <footer>
      <small>O pareamento abre em uma aba (a câmera não funciona no popup).</small>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
