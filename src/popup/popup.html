<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Aula</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Controle de Aula</h1>
      <p class="status" id="status">Conectando…</p>
      <button id="btn-reconectar" class="icone" title="Reconectar ao Firebase">⟳</button>
    </header>

    <main>
      <section id="conectado" hidden>
        <div class="unidade">
          <span class="unidade-rotulo">Unidade</span>
          <span class="unidade-numero" id="numero">—</span>
        </div>
        <p class="ok" id="prof">✅ Conectado ao professor.</p>
      </section>

      <!-- Só aparece no PC do professor (telão): snapshot da turma presente. -->
      <section id="telao" hidden>
        <button id="btn-turma">📺 Ver a turma</button>
        <p class="dica">Este PC foi marcado como PC do professor no app.</p>
      </section>

      <section id="pareamento" hidden>
        <p class="passo">Peça ao professor para escanear este QR no app:</p>
        <div class="qr" id="qr"><span class="dica">Gerando QR…</span></div>
        <button id="btn-tela-cheia">Abrir QR em tela cheia</button>
        <p class="dica" id="detalhe"></p>
      </section>

      <section id="conectando" hidden>
        <p class="passo">Conectando ao Firebase…</p>
        <p class="dica" id="detalhe2"></p>
      </section>

      <button id="btn-reset" class="secundario">Desvincular professor</button>
    </main>

    <footer>
      <small>O vínculo é exclusivo: só o professor que escaneou o QR controla
        este PC.</small>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
